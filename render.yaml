services:
  # Backend API
  - type: web
    name: socionet-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node -r tsconfig-paths/register dist/index.js
    envVars:
      - key: NODE_ENV
        value: production

  # Realtime service
  - type: web
    name: socionet-realtime
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production

  # Frontend (Next.js)
  - type: web
    name: socionet-web
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start

databases:
  - name: socionet-db
    plan: free

redis:
  - name: socionet-redis
    plan: free
