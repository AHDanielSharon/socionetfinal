events { worker_connections 4096; multi_accept on; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on; tcp_nopush on; tcp_nodelay on; keepalive_timeout 65;
  client_max_body_size 500m;
  gzip on; gzip_vary on; gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  upstream api { server api:4000; keepalive 32; }
  upstream realtime { server realtime:4001; keepalive 64; }
  upstream web { server web:3000; keepalive 32; }
  include /etc/nginx/conf.d/*.conf;
}
