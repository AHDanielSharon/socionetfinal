server {
  listen 80;
  server_name _;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  location /api/ { limit_req zone=api burst=30 nodelay; proxy_pass http://api; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
  location /api/v1/auth/ { limit_req zone=auth burst=5 nodelay; proxy_pass http://api; proxy_http_version 1.1; proxy_set_header Host $host; }
  location /socket.io/ { proxy_pass http://realtime; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; proxy_buffering off; }
  location / { proxy_pass http://web; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}
